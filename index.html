<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AB.BAT - Connexion</title>
  <link rel="stylesheet" href="css/index.css">
</head>
<body class="body-login">

  <div class="login-container">
    <div class="login-card">

      <!-- Logo animé -->
      <div class="logo-container text-center mb-10">
        <h1 class="logo animate-logo-more-visible inline-block">
          <span class="text-abBlue">AB.</span><span class="text-abOrange">BAT</span>
        </h1>
        <p class="slogan">Gestion des fournisseurs</p>
      </div>

      <!-- Formulaire -->
      <form id="loginForm" class="login-form">

        <div class="form-group">
          <label for="username">Nom d'utilisateur</label>
          <input
            id="username"
            type="text"
            required
            autocomplete="username"
            placeholder="votre_nom"
          />
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input
            id="password"
            type="password"
            required
            autocomplete="current-password"
            placeholder="••••••••"
          />
          <button type="button" class="password-toggle" id="togglePassword">
            <svg id="eyeOpen" class="eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <svg id="eyeClosed" class="eye-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
            </svg>
          </button>
        </div>

        <div class="options">
          <label class="remember">
            <input type="checkbox" />
            <span>Se souvenir de moi</span>
          </label>
          <a href="#" class="forgot">Mot de passe oublié ?</a>
        </div>

        <button type="submit" id="loginBtn" class="btn-connect">
          <span id="btnText">Se connecter</span>
          <div id="spinner" class="hidden spinner"></div>
        </button>

      </form>

    </div>
  </div>

  <script src="js/index.js"></script>
</body>
</html>
