<body>

<div class="page">
  <div class="page-inner">

    <div class="page-header">
      <button class="hamburger" id="hamburgerBtn" onclick="openSidebar()" style="display:none">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <h1 class="page-title">Fournisseurs</h1>
      <div style="display:flex;gap:8px">
        <a href="php/export.php" class="btn btn-ghost">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          Exporter CSV
        </a>
        <button class="btn btn-primary" onclick="openAdd()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Ajouter un fournisseur
        </button>
      </div>
    </div>

    <div class="filters">
      <div class="search-wrap">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input id="searchInput" class="input-field search-input" type="search" placeholder="Rechercher un fournisseur…" oninput="loadList()"/>
      </div>
      <select id="catFilter" class="input-field" onchange="loadList()">
        <option value="">Toutes les catégories</option>
      </select>
    </div>

    <div id="list" class="f-list"></div>

  </div>
</div>

<!-- Modal ajout/édition -->
<div id="modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Ajouter un fournisseur</span>
      <button class="modal-close" onclick="closeModal()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="form-group">
      <label class="form-label">Nom du fournisseur *</label>
      <input id="fNom" class="input-field" type="text" placeholder="Ex : Matériaux Diallo & Fils"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Téléphone</label>
        <input id="fTel" class="input-field" type="text" placeholder="07 00 00 00 00"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="fEmail" class="input-field" type="email" placeholder="email@société.ci"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Catégorie</label>
      <select id="fCat" class="input-field"><option value="">— Choisir —</option></select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Montant total (FCFA)</label>
        <input id="fTotal" class="input-field" type="text" inputmode="numeric" placeholder="0" oninput="fmtInput(this)"/>
      </div>
      <div class="form-group">
        <label class="form-label">Montant payé (FCFA)</label>
        <input id="fPaye" class="input-field" type="text" inputmode="numeric" placeholder="0" oninput="fmtInput(this)"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea id="fNotes" class="input-field" placeholder="Conditions, observations…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" id="saveBtn" onclick="save()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modal suppression -->
<div id="delModal" class="modal-overlay">
  <div class="modal" style="max-width:380px;text-align:center">
    <div style="width:54px;height:54px;border-radius:14px;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.2);display:flex;align-items:center;justify-content:center;margin:0 auto 18px">
      <svg style="width:26px;height:26px;color:#f43f5e" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
    </div>
    <h3 class="display" style="font-size:22px;font-weight:700;margin-bottom:8px">Supprimer ce fournisseur ?</h3>
    <p style="color:var(--text2);font-size:13px;margin-bottom:24px;line-height:1.6">Toutes les données et contacts associés seront définitivement supprimés.</p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="document.getElementById('delModal').classList.remove('open')">Annuler</button>
      <button class="btn btn-danger" style="flex:1;justify-content:center" onclick="confirmDel()">Supprimer</button>
    </div>
  </div>
</div>

<script>
const fmt = v => new Intl.NumberFormat('fr-FR', { style: 'decimal', maximumFractionDigits: 0 }).format(v) + ' FCFA';
let cats = [], editId = null, delId = null;

async function init() {
  const r = await fetch('php/api.php?action=categories');
  const { data } = await r.json();
  cats = data;
  const opts = data.map(c => `<option value="${c.id}">${c.nom}</option>`).join('');
  document.getElementById('catFilter').innerHTML += opts;
  document.getElementById('fCat').innerHTML += opts;
  loadList();
}

async function loadList() {
  const q   = document.getElementById('searchInput').value;
  const cat = document.getElementById('catFilter').value;
  const r   = await fetch(`php/api.php?action=fournisseurs&q=${encodeURIComponent(q)}&categorie=${cat}`);
  const { data } = await r.json();

  if (!data || !data.length) {
    document.getElementById('list').innerHTML = `
      <div class="empty">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5"/></svg>
        <p>Aucun fournisseur trouvé</p>
      </div>`;
    return;
  }

  document.getElementById('list').innerHTML = data.map(f => {
    const restant   = f.montant_total - f.montant_paye;
    const pct       = f.montant_total > 0 ? Math.round(f.montant_paye / f.montant_total * 100) : 0;
    const color     = f.categorie_couleur || '#94a3b8';
    const restColor = restant > 0 ? '#f97316' : '#22d3a0';
    return `
    <div class="f-row" onclick="window.location='fiche.html?id=${f.id}'">
      <span class="f-dot" style="background:${color}"></span>
      <div class="f-info">
        <div class="f-name">${f.nom}</div>
        <div class="f-sub">${f.categorie_nom || 'Sans catégorie'}${f.telephone ? ' · ' + f.telephone : ''}</div>
        <div class="f-bar"><div class="f-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>
      <div class="f-amounts">
        <div class="f-restant" style="color:${restColor}">${fmt(restant)}</div>
        <div class="f-total-txt">${fmt(f.montant_total)} total · ${pct}%</div>
      </div>
      <div class="f-actions" onclick="event.stopPropagation()">
        <button title="Modifier" onclick="editF(${JSON.stringify(f).replace(/"/g,'&quot;')})">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
        </button>
        <button class="del" title="Supprimer" onclick="askDel(${f.id})">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

function openAdd() {
  editId = null;
  document.getElementById('modalTitle').textContent = 'Ajouter un fournisseur';
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  editId = null;
  document.getElementById('modal').classList.remove('open');
  ['fNom','fTel','fEmail','fNotes','fTotal','fPaye'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fCat').value = '';
}
function fmtInput(el) {
  const pos = el.selectionStart;
  const before = el.value.length;
  const raw = el.value.replace(/\D/g, '');
  const formatted = raw ? parseInt(raw, 10).toLocaleString('fr-FR') : '';
  el.value = formatted;
  const diff = el.value.length - before;
  el.setSelectionRange(pos + diff, pos + diff);
}
function getNumVal(id) {
  const v = document.getElementById(id).value.replace(/\s/g, '').replace(/\u202f/g, '').replace(/\u00a0/g, '');
  return parseFloat(v) || 0;
}
function setNumVal(id, num) {
  document.getElementById(id).value = num ? parseInt(num).toLocaleString('fr-FR') : '';
}

function editF(f) {
  editId = f.id;
  document.getElementById('modalTitle').textContent = 'Modifier le fournisseur';
  document.getElementById('fNom').value   = f.nom;
  document.getElementById('fTel').value   = f.telephone || '';
  document.getElementById('fEmail').value = f.email || '';
  document.getElementById('fCat').value   = f.categorie_id || '';
  setNumVal('fTotal', f.montant_total);
  setNumVal('fPaye',  f.montant_paye);
  document.getElementById('fNotes').value = f.notes || '';
  document.getElementById('modal').classList.add('open');
}
async function save() {
  const nom = document.getElementById('fNom').value.trim();
  if (!nom) { alert('Le nom est obligatoire.'); return; }
  const body = { nom, telephone: document.getElementById('fTel').value, email: document.getElementById('fEmail').value, categorie_id: document.getElementById('fCat').value, montant_total: getNumVal('fTotal'), montant_paye: getNumVal('fPaye'), notes: document.getElementById('fNotes').value };
  const btn = document.getElementById('saveBtn');
  btn.textContent = '…'; btn.disabled = true;
  if (editId) await fetch(`php/api.php?action=fournisseur&id=${editId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  else await fetch('php/api.php?action=fournisseurs', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  btn.textContent = 'Enregistrer'; btn.disabled = false;
  closeModal(); loadList();
}
function askDel(id) { delId = id; document.getElementById('delModal').classList.add('open'); }
async function confirmDel() { await fetch(`php/api.php?action=fournisseur&id=${delId}`, { method:'DELETE' }); document.getElementById('delModal').classList.remove('open'); loadList(); }

init();
</script>
</body>
</html>
